<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="860" viewBox="0 0 1240 860">
  <rect width="1240" height="860" fill="#ffffff"/>
  <text x="30" y="40" font-size="26" font-family="Arial" font-weight="bold">Recognize - Track - Command Flow (Elvin)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Pipeline top row -->
  <rect x="60" y="80" width="240" height="70" fill="#e8f4ff" stroke="#1f3b5c" stroke-width="2"/>
  <text x="95" y="115" font-size="17" font-family="Arial">Capture Frame</text>
  <text x="95" y="138" font-size="12" font-family="Arial" fill="#555">USB camera</text>

  <rect x="360" y="80" width="250" height="70" fill="#edfced" stroke="#1d4f2b" stroke-width="2"/>
  <text x="385" y="115" font-size="17" font-family="Arial">Detect Faces</text>
  <text x="385" y="138" font-size="12" font-family="Arial" fill="#555">Haar + FaceMesh 5pt</text>

  <rect x="670" y="80" width="300" height="70" fill="#fff9e6" stroke="#6b5b00" stroke-width="2"/>
  <text x="695" y="112" font-size="16" font-family="Arial">Embeddings + Compare</text>
  <text x="695" y="136" font-size="12" font-family="Arial" fill="#555">ArcFace ONNX, cosine distance</text>

  <!-- Decision -->
  <polygon points="610,230 760,300 610,370 460,300" fill="#f4ecff" stroke="#4b2f72" stroke-width="2"/>
  <text x="540" y="298" font-size="16" font-family="Arial">Speaker (Elvin)</text>
  <text x="560" y="320" font-size="16" font-family="Arial">matched?</text>

  <!-- YES: lock + track -->
  <rect x="800" y="250" width="380" height="120" fill="#eef9ff" stroke="#204a63" stroke-width="2"/>
  <text x="820" y="282" font-size="17" font-family="Arial" font-weight="bold">Speaker Lock + Tracking</text>
  <text x="820" y="308" font-size="13" font-family="Arial">Horizontal error, deadband, smoothing</text>
  <text x="820" y="330" font-size="13" font-family="Arial">Centered -> CENTER / IDLE (HOLD on face)</text>
  <text x="820" y="352" font-size="13" font-family="Arial">Off-center -> LEFT / RIGHT</text>

  <!-- NO: lost handling -->
  <rect x="60" y="430" width="430" height="160" fill="#ffeef0" stroke="#7a1f28" stroke-width="2"/>
  <text x="80" y="462" font-size="17" font-family="Arial" font-weight="bold">No Match / Face Lost</text>
  <text x="80" y="488" font-size="13" font-family="Arial">Non-target face -> ignore (Unknown)</text>
  <text x="80" y="510" font-size="13" font-family="Arial">Locked face lost -> grace, then search:</text>
  <text x="80" y="532" font-size="13" font-family="Arial">1) Directional seek toward last side</text>
  <text x="80" y="554" font-size="13" font-family="Arial">2) Full sweep (SCAN) fallback</text>
  <text x="80" y="576" font-size="13" font-family="Arial">IDLE while waiting (servo holds)</text>

  <!-- Reacquire/center -->
  <rect x="560" y="450" width="430" height="120" fill="#eafbf0" stroke="#1d6f3b" stroke-width="2"/>
  <text x="580" y="482" font-size="17" font-family="Arial" font-weight="bold">Reacquire + Center</text>
  <text x="580" y="508" font-size="13" font-family="Arial">Halt sweep instantly on recognition</text>
  <text x="580" y="530" font-size="13" font-family="Arial">Nudge to center on live position</text>
  <text x="580" y="552" font-size="13" font-family="Arial">When centered -> "Elvin found, stop!"</text>

  <!-- Publish -->
  <rect x="470" y="680" width="380" height="90" fill="#f7f7f7" stroke="#333333" stroke-width="2"/>
  <text x="500" y="715" font-size="17" font-family="Arial" font-weight="bold">Publish MQTT Command</text>
  <text x="500" y="742" font-size="13" font-family="Arial">LEFT / RIGHT / CENTER / SCAN / IDLE</text>
  <text x="500" y="762" font-size="12" font-family="Arial" fill="#555">topic vision/elvin/movement -> ESP32 servo</text>

  <!-- Arrows -->
  <line x1="300" y1="115" x2="358" y2="115" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="610" y1="115" x2="668" y2="115" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="820" y1="150" x2="700" y2="245" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="760" y1="300" x2="800" y2="300" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="762" y="290" font-size="15" font-family="Arial">Yes</text>

  <line x1="540" y1="355" x2="320" y2="428" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="430" y="400" font-size="15" font-family="Arial">No</text>

  <!-- search -> reacquire -->
  <line x1="490" y1="505" x2="558" y2="505" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="498" y="495" font-size="12" font-family="Arial">found</text>

  <!-- reacquire -> lock/track -->
  <line x1="880" y1="450" x2="940" y2="372" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="892" y="420" font-size="12" font-family="Arial">resume track</text>

  <!-- track -> publish -->
  <line x1="900" y1="370" x2="760" y2="678" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- lost/search -> publish -->
  <line x1="300" y1="590" x2="540" y2="678" stroke="#000" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
